<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STELLAR FORCE - INTRO PREVIEW</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#000; }
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Press Start 2P', monospace; gap:14px; }
  canvas { background:#000; display:block; image-rendering:pixelated; border: 2px solid #333; }
  .controls button { background:#111; color:#ddeeff; border:1px solid #446; padding:8px 14px; font-family:'Press Start 2P', monospace; font-size:10px; cursor:pointer; letter-spacing:1px; }
  .controls button:hover { background:#1a3366; }
  .hint { color:#666; font-size:11px; font-family:'Noto Sans KR', sans-serif; text-align:center; }
</style>
</head>
<body>
<div class="hint">INTRO PREVIEW — 제국 함대의 지구 공격 → 폐허 기지 출격</div>
<canvas id="game" width="640" height="480"></canvas>
<div class="controls"><button id="btnReplay">REPLAY</button></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = canvas.width, H = canvas.height;

const stars = [];
for (let i = 0; i < 220; i++) stars.push({ x: Math.random()*W, y: Math.random()*H, z: Math.random()*3 + 0.3 });

let t = 0;
let damageMarks = [];
let lasers = [];
let smokes = [];
let trail = [];

function resetIntro() { t = 0; damageMarks = []; lasers = []; smokes = []; trail = []; }
document.getElementById('btnReplay').addEventListener('click', resetIntro);

const earth = { x: W/2, y: H/2 + 10, r: 80 };
const earthBefore = new Image();
earthBefore.src = 'assets/earth_before.jpg';
const earthAfter = new Image();
earthAfter.src = 'assets/earth_after.jpg';
const fleetShips = [
  { ox: 0,   oy: -40, s: 1.2 },
  { ox: -40, oy:  20, s: 1.0 },
  { ox: 20,  oy:  60, s: 0.9 },
  { ox: -20, oy: -80, s: 0.8 },
  { ox: -60, oy: -10, s: 1.1 },
];

function drawEarth(alpha, burnT, img) {
  ctx.globalAlpha = alpha;
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(earth.x, earth.y, earth.r, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(img, earth.x - earth.r, earth.y - earth.r, earth.r*2, earth.r*2);
    ctx.restore();
  } else {
    ctx.fillStyle = '#1144aa';
    ctx.beginPath(); ctx.arc(earth.x, earth.y, earth.r, 0, Math.PI*2); ctx.fill();
  }

  if (burnT > 0) {
    ctx.globalAlpha = alpha * Math.min(0.45, burnT / 200);
    ctx.fillStyle = '#ff5522';
    ctx.beginPath(); ctx.arc(earth.x, earth.y, earth.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawShip(x, y, s) {
  const r = v => Math.round(v * s);
  const px = Math.round(x), py = Math.round(y);
  ctx.fillStyle = '#555566';
  ctx.beginPath();
  ctx.moveTo(px + r(20), py);
  ctx.lineTo(px - r(15), py - r(8));
  ctx.lineTo(px - r(15), py + r(8));
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#333344';
  ctx.fillRect(px - r(18), py - r(4), r(6), r(8));
  ctx.fillStyle = '#777788';
  ctx.fillRect(px - r(5), py - r(11), r(10), r(4));
  ctx.fillStyle = '#ff3344';
  ctx.fillRect(px - r(20), py - r(2), r(3), r(4));
}

function drawImperialFleet(progress) {
  const baseX = W + 100 - progress * 210;
  for (const s of fleetShips) drawShip(baseX + s.ox, H/2 + s.oy, s.s);
}

function drawLaserBeam(fx, fy, tx, ty, color) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 3;
  ctx.shadowBlur = 20; ctx.shadowColor = color;
  ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.restore();
}

function drawRuinedBase() {
  const groundY = H - 80;
  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(0, groundY, W, 80);
  ctx.fillStyle = '#15090a';
  for (let i = 0; i < 40; i++) ctx.fillRect(i * 16 + (i%3)*4, groundY + 6 + (i%2)*3, 8, 5);

  const towers = [
    { x: 50,  h: 95,  w: 26, tilt: -0.18 },
    { x: 130, h: 55,  w: 20, tilt: 0.10 },
    { x: 220, h: 70,  w: 16, tilt: -0.05 },
    { x: 440, h: 65,  w: 18, tilt: 0.06 },
    { x: 510, h: 105, w: 30, tilt: 0.03 },
    { x: 580, h: 45,  w: 16, tilt: -0.22 },
  ];
  for (const t of towers) {
    ctx.save();
    ctx.translate(t.x, groundY);
    ctx.rotate(t.tilt);
    ctx.fillStyle = '#4a3a3f';
    ctx.fillRect(0, -t.h, t.w, t.h);
    ctx.fillStyle = '#1a0f10';
    ctx.fillRect(3, -t.h + 10, 4, 5);
    ctx.fillRect(t.w - 7, -t.h + 26, 4, 5);
    ctx.fillStyle = '#0a0406';
    ctx.beginPath();
    ctx.moveTo(0, -t.h);
    ctx.lineTo(t.w * 0.4, -t.h - 8);
    ctx.lineTo(t.w * 0.7, -t.h - 3);
    ctx.lineTo(t.w, -t.h);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  ctx.fillStyle = '#111';
  ctx.fillRect(W/2 - 45, groundY - 54, 90, 54);
  ctx.fillStyle = '#ff6644';
  ctx.fillRect(W/2 - 40, groundY - 50, 80, 5);
  ctx.fillStyle = '#221114';
  ctx.fillRect(W/2 - 40, groundY - 44, 80, 44);
}

function drawPlayer(x, y, s) {
  const r = v => Math.round(v * s);
  const px = Math.round(x), py = Math.round(y);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(px - r(14), py - r(4), r(28), r(8));
  ctx.fillStyle = '#66aaff';
  ctx.fillRect(px + r(14), py - r(2), r(6), r(4));
  ctx.fillRect(px + r(20), py - r(1), r(3), r(2));
  ctx.fillStyle = '#aaddff';
  ctx.fillRect(px + r(4), py - r(2), r(6), r(4));
  ctx.fillStyle = '#3366cc';
  ctx.fillRect(px - r(10), py - r(8), r(16), r(4));
  ctx.fillRect(px - r(10), py + r(4), r(16), r(4));
  ctx.fillStyle = '#5599ee';
  ctx.fillRect(px - r(14), py - r(10), r(6), r(3));
  ctx.fillRect(px - r(14), py + r(7), r(6), r(3));
  ctx.fillStyle = '#ff6622';
  ctx.fillRect(px - r(18), py - r(3), r(4), r(6));
  ctx.fillStyle = '#ffaa44';
  ctx.fillRect(px - r(22), py - r(2), r(4), r(4));
  ctx.fillStyle = '#ffee88';
  ctx.fillRect(px - r(26), py - r(1), r(2), r(2));
}

function drawPlayerRocket(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-Math.PI / 2);
  drawPlayer(0, 0, s);
  ctx.restore();
}

function drawLaunchPad(cx, groundY) {
  for (const side of [-1, 1]) {
    const tx = cx + side * 38;
    ctx.fillStyle = '#5a5560';
    ctx.fillRect(tx - 4, groundY - 170, 8, 170);
    ctx.fillStyle = '#3a3540';
    for (let y = groundY - 160; y < groundY - 5; y += 18) {
      ctx.fillRect(tx - 4, y, 8, 2);
    }
  }
  ctx.strokeStyle = '#4a4650';
  ctx.lineWidth = 1;
  for (let y = groundY - 160; y < groundY - 10; y += 22) {
    ctx.beginPath();
    ctx.moveTo(cx - 38, y);
    ctx.lineTo(cx + 38, y + 11);
    ctx.moveTo(cx + 38, y);
    ctx.lineTo(cx - 38, y + 11);
    ctx.stroke();
  }
  ctx.fillStyle = '#6a6068';
  ctx.fillRect(cx - 32, groundY - 95, 14, 3);
  ctx.fillRect(cx + 18, groundY - 95, 14, 3);
  ctx.fillRect(cx - 32, groundY - 55, 14, 3);
  ctx.fillRect(cx + 18, groundY - 55, 14, 3);
  ctx.fillStyle = '#2a2228';
  ctx.fillRect(cx - 55, groundY - 10, 110, 10);
  ctx.fillStyle = '#ff6644';
  ctx.fillRect(cx - 50, groundY - 8, 100, 2);
  ctx.fillStyle = '#22191c';
  ctx.fillRect(cx - 20, groundY - 20, 40, 12);
}

function drawStars(speed) {
  for (const s of stars) {
    s.x -= s.z * speed;
    if (s.x < 0) { s.x = W; s.y = Math.random()*H; }
    ctx.fillStyle = s.z > 2 ? '#ffffff' : s.z > 1 ? '#aaccff' : '#5566aa';
    const sz = Math.max(1, Math.floor(s.z));
    ctx.fillRect(s.x, s.y, sz, sz);
  }
}

function subtitle(text, alpha, color, y, font) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.font = font;
  ctx.textAlign = 'center';
  ctx.fillText(text, W/2, y);
  ctx.globalAlpha = 1;
}

function loop() {
  t++;
  ctx.fillStyle = '#000014';
  ctx.fillRect(0, 0, W, H);

  if (t < 660) drawStars(0.4);

  if (t < 240) {
    const a = Math.min(1, t / 60);
    drawEarth(a, 0, earthBefore);
    if (t > 60) drawImperialFleet(Math.min(1, (t - 60) / 180));
    if (t > 30) subtitle('서기 2284년 — 제국 함대가 지구를 덮치다', Math.min(1, (t - 30) / 60), '#ddeeff', H - 40, '14px "Noto Sans KR", sans-serif');

  } else if (t < 420) {
    const sceneT = t - 240;
    drawEarth(1, sceneT, earthBefore);
    drawImperialFleet(1);

    if (sceneT % 10 === 0) {
      const si = Math.floor(Math.random() * fleetShips.length);
      const sh = fleetShips[si];
      const fx = W + 100 - 210 + sh.ox - 20;
      const fy = H/2 + sh.oy;
      const ang = Math.random() * Math.PI * 2;
      const rr = Math.random() * earth.r * 0.9;
      const tx = earth.x + Math.cos(ang) * rr;
      const ty = earth.y + Math.sin(ang) * rr;
      lasers.push({ fx, fy, tx, ty, life: 8 });
      damageMarks.push({ x: tx, y: ty, life: 260, maxLife: 260, size: 2 + Math.random()*3 });
    }

    for (let i = lasers.length - 1; i >= 0; i--) {
      const l = lasers[i];
      const flk = Math.random() > 0.3;
      if (flk) drawLaserBeam(l.fx, l.fy, l.tx, l.ty, '#ff3366');
      l.life--;
      if (l.life <= 0) lasers.splice(i, 1);
    }

    for (const d of damageMarks) {
      const la = d.life / d.maxLife;
      ctx.globalAlpha = 0.6 + la * 0.4;
      const col = la > 0.6 ? '#ffee88' : la > 0.3 ? '#ff7722' : '#552211';
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * (1 + (1-la)*0.8), 0, Math.PI*2);
      ctx.fill();
      d.life--;
    }
    ctx.globalAlpha = 1;

    subtitle('지구는 불바다로 변했다', Math.min(1, sceneT / 30), '#ff8888', H - 40, '14px "Noto Sans KR", sans-serif');

  } else if (t < 450) {
    const sceneT = t - 420;
    if (sceneT < 10) {
      ctx.fillStyle = `rgba(255,220,180,${0.9 - sceneT/10 * 0.9})`;
      ctx.fillRect(0, 0, W, H);
    }
    const cp = Math.min(1, sceneT / 30);
    drawEarth(1 - cp, 240, earthBefore);
    drawEarth(cp, 0, earthAfter);

  } else if (t < 600) {
    const sceneT = t - 450;
    drawEarth(1, 0, earthAfter);
    subtitle('잿빛 행성 — 푸른 별은 더 이상 없다', Math.min(1, sceneT / 40), '#ff9999', H - 40, '14px "Noto Sans KR", sans-serif');

  } else if (t < 660) {
    const sceneT = t - 600;
    drawEarth(Math.max(0, 1 - sceneT / 40), 0, earthAfter);
    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(1, sceneT / 40)})`;
    ctx.fillRect(0, 0, W, H);

  } else if (t < 960) {
    const sceneT = t - 660;
    const sg = ctx.createLinearGradient(0, 0, 0, H - 80);
    sg.addColorStop(0, '#1a0a1a');
    sg.addColorStop(0.6, '#2a1020');
    sg.addColorStop(1, '#3a1a20');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H - 80);

    drawRuinedBase();
    drawLaunchPad(W/2, H - 80);

    if (sceneT % 4 === 0) {
      [ { x: 62, y: H - 175 }, { x: 520, y: H - 185 }, { x: 130, y: H - 135 } ].forEach(src => {
        smokes.push({
          x: src.x + (Math.random()-0.5)*14,
          y: src.y,
          vx: (Math.random()-0.5)*0.5,
          vy: -0.7 - Math.random()*0.6,
          life: 150, maxLife: 150,
          size: 12 + Math.random()*18,
        });
      });
    }
    for (let i = smokes.length - 1; i >= 0; i--) {
      const sm = smokes[i];
      sm.x += sm.vx; sm.y += sm.vy;
      sm.life--;
      if (sm.life <= 0) { smokes.splice(i, 1); continue; }
      const a = Math.min(0.4, sm.life / sm.maxLife * 0.55);
      const g = ctx.createRadialGradient(sm.x, sm.y, 0, sm.x, sm.y, sm.size);
      g.addColorStop(0, `rgba(130,120,115,${a})`);
      g.addColorStop(1, 'rgba(30,25,25,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(sm.x, sm.y, sm.size, 0, Math.PI*2); ctx.fill();
    }

    const shipS = 1.8;
    const baseRocketY = H - 200;
    let rocketY = baseRocketY;
    let ignited = false;
    if (sceneT >= 80) {
      const lt = sceneT - 80;
      rocketY = baseRocketY - lt * 2.4;
      ignited = true;
    } else if (sceneT >= 60) {
      rocketY = baseRocketY + (Math.random() - 0.5) * 2;
    }

    if (sceneT >= 60) {
      const intensity = ignited ? 1 : 0.35;
      const fb = rocketY + 24 * shipS;
      ctx.fillStyle = '#ffee88';
      ctx.beginPath();
      ctx.ellipse(W/2, fb + 6 * intensity, 10 * shipS * intensity, 16 * shipS * intensity, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ff6622';
      ctx.beginPath();
      ctx.ellipse(W/2, fb + 20 * intensity, 8 * shipS * intensity, 28 * shipS * intensity, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#aa2200';
      ctx.beginPath();
      ctx.ellipse(W/2, fb + 38 * intensity, 6 * shipS * intensity, 42 * shipS * intensity, 0, 0, Math.PI*2);
      ctx.fill();
      if (ignited && sceneT % 2 === 0) {
        trail.push({ x: W/2 + (Math.random()-0.5)*30, y: fb + 50 + Math.random()*30, life: 50, maxLife: 50, size: 10 + Math.random()*12 });
      }
    }
    for (let i = trail.length - 1; i >= 0; i--) {
      const p = trail[i];
      p.life--;
      p.y += 0.4;
      if (p.life <= 0) { trail.splice(i, 1); continue; }
      const la = p.life / p.maxLife;
      ctx.globalAlpha = la * 0.5;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      g.addColorStop(0, '#aa8866');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawPlayerRocket(W/2, rocketY, shipS);

    subtitle('폐허가 된 기지, 마지막 희망이 출격한다', Math.min(1, sceneT / 40), '#ddeeff', 42, '14px "Noto Sans KR", sans-serif');
    if (sceneT > 40) {
      ctx.globalAlpha = Math.min(1, (sceneT - 40) / 40);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff3344';
      ctx.font = 'bold 16px "Noto Sans KR", sans-serif';
      ctx.fillText('개빡친!', W/2, 66);
      ctx.fillStyle = '#ffcc44';
      ctx.font = '16px "Press Start 2P"';
      ctx.fillText('STELLAR FORCE', W/2, 90);
      ctx.globalAlpha = 1;
    }

  } else {
    const sceneT = t - 960;
    drawStars(1.5);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#4488ff';
    ctx.font = '44px "Press Start 2P"';
    ctx.fillText('STELLAR', W/2, H/2 - 30);
    ctx.fillStyle = '#ff4444';
    ctx.fillText('FORCE', W/2, H/2 + 20);
    if (Math.floor(sceneT / 30) % 2) {
      ctx.fillStyle = '#ddeeff';
      ctx.font = '12px "Press Start 2P"';
      ctx.fillText('PRESS START', W/2, H/2 + 80);
    }
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
